# GeneralsX iOS DXVK runtime configuration
#
# Keep sampler-type spec constants disabled (terrain shader stability baseline,
# same as the macOS deployment).
d3d9.forceSamplerTypeSpecConstants = False

# 16x anisotropic filtering: the RTS camera views terrain at a shallow angle,
# where plain trilinear filtering smears the ground textures into mud. Free on
# a modern mobile GPU.
d3d9.samplerAnisotropy = 16

# No debug logging in normal play: the d3d9 log regrows by hundreds of KB per
# session and is only useful when actively debugging the renderer.
dxvk.logLevel = none
